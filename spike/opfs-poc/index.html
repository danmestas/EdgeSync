<!DOCTYPE html>
<html>
<head>
    <title>EdgeSync — Fossil in the Browser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #0c0e14;
            --bg-1: #12151e;
            --bg-2: #1a1e2e;
            --bg-3: #232838;
            --border: #2a3040;
            --text-0: #e8ecf4;
            --text-1: #a0aabe;
            --text-2: #6b7590;
            --accent: #e5a844;
            --accent-dim: #9e7530;
            --green: #5cb870;
            --green-dim: rgba(92,184,112,0.15);
            --red: #e05252;
            --red-dim: rgba(224,82,82,0.15);
            --orange: #e5a844;
            --orange-dim: rgba(229,168,68,0.15);
            --blue: #5b9bd5;
            --blue-dim: rgba(91,155,213,0.15);
            --mono: 'JetBrains Mono', monospace;
            --sans: 'DM Sans', system-ui, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: var(--mono);
            font-size: 13px;
            background: var(--bg-0);
            color: var(--text-0);
            display: flex;
            flex-direction: column;
        }

        /* ---- Header Bar ---- */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--bg-1);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .header .logo {
            font-family: var(--sans);
            font-weight: 600;
            font-size: 15px;
            color: var(--accent);
            letter-spacing: -0.3px;
            white-space: nowrap;
        }
        .header .logo span { color: var(--text-2); font-weight: 400; }
        .header input {
            flex: 1;
            min-width: 160px;
            max-width: 320px;
            background: var(--bg-0);
            border: 1px solid var(--border);
            color: var(--text-0);
            padding: 5px 10px;
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 12px;
        }
        .header input:focus { border-color: var(--accent-dim); outline: none; }

        /* ---- Buttons ---- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border: 1px solid var(--border);
            background: var(--bg-2);
            color: var(--text-1);
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .btn:hover { background: var(--bg-3); color: var(--text-0); border-color: var(--text-2); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
        .btn.primary:hover { background: var(--accent); color: var(--bg-0); }
        .btn.danger { border-color: var(--red); color: var(--red); }
        .btn.danger:hover { background: var(--red-dim); }
        .btn.sm { padding: 3px 8px; font-size: 11px; }

        /* ---- Status Strip ---- */
        .status-strip {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 4px 16px;
            background: var(--bg-1);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-2);
            flex-shrink: 0;
        }
        .status-strip .metric { display: flex; align-items: center; gap: 4px; }
        .status-strip .metric .v { color: var(--text-0); font-weight: 500; }
        .status-strip .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .status-strip .dot.ok { background: var(--green); }
        .status-strip .dot.off { background: var(--text-2); }
        .status-strip .sep { width: 1px; height: 14px; background: var(--border); }

        /* ---- Main Layout ---- */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--bg-1);
            overflow: hidden;
        }
        .sidebar-section {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-section.grow { flex: 1; }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            font-family: var(--sans);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-2);
            border-bottom: 1px solid var(--border);
            background: var(--bg-2);
            flex-shrink: 0;
        }
        .section-head .actions { display: flex; gap: 4px; }

        /* ---- File Tree ---- */
        .tree-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }
        .tree-list li {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-1);
            border-left: 2px solid transparent;
        }
        .tree-list li:hover { background: var(--bg-2); }
        .tree-list li.active { background: var(--bg-3); border-left-color: var(--accent); color: var(--text-0); }
        .tree-list .icon { font-size: 13px; flex-shrink: 0; width: 16px; text-align: center; }
        .tree-list .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tree-list .meta { font-size: 10px; color: var(--text-2); flex-shrink: 0; }
        .tree-list .dir .name { color: var(--blue); }
        .tree-list .badge { font-size: 9px; padding: 1px 4px; border-radius: 3px; font-weight: 600; flex-shrink: 0; }
        .tree-list .badge.M { background: var(--orange-dim); color: var(--orange); }
        .tree-list .badge.A { background: var(--green-dim); color: var(--green); }
        .tree-list .badge.D { background: var(--red-dim); color: var(--red); }

        /* ---- Timeline ---- */
        .timeline-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }
        .timeline-list li {
            padding: 6px 12px;
            border-bottom: 1px solid var(--border);
            cursor: default;
            font-size: 11px;
            line-height: 1.5;
        }
        .timeline-list .hash { color: var(--accent); font-weight: 500; }
        .timeline-list .author { color: var(--blue); }
        .timeline-list .msg { color: var(--text-1); }
        .timeline-list .time { color: var(--text-2); }
        .timeline-list .tag { display: inline-block; font-size: 9px; padding: 0 4px; border-radius: 2px; background: var(--blue-dim); color: var(--blue); margin-left: 4px; }

        /* ---- Editor Area ---- */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .editor-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .editor-toolbar .filepath {
            flex: 1;
            font-size: 12px;
            color: var(--text-2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .editor-toolbar .filepath .filename { color: var(--text-0); }
        .editor-wrap { flex: 1; position: relative; overflow: hidden; }
        .editor-wrap textarea {
            width: 100%;
            height: 100%;
            resize: none;
            background: var(--bg-0);
            color: var(--text-0);
            border: none;
            padding: 12px 16px;
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.6;
            outline: none;
            tab-size: 4;
        }
        .editor-wrap textarea::placeholder { color: var(--text-2); }

        /* ---- Commit Bar ---- */
        .commit-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-1);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .commit-bar input {
            flex: 1;
            background: var(--bg-0);
            border: 1px solid var(--border);
            color: var(--text-0);
            padding: 5px 10px;
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 12px;
        }
        .commit-bar input:focus { border-color: var(--accent-dim); outline: none; }
        .commit-bar input.user { max-width: 100px; }

        /* ---- Right Panel (Remote/Log) ---- */
        .right-panel {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
            background: var(--bg-1);
            overflow: hidden;
        }
        .log-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            font-size: 11px;
            line-height: 1.6;
            color: var(--text-2);
        }
        .log-area .err { color: var(--red); }
        .log-area .ok { color: var(--green); }
        .log-area b { color: var(--text-0); font-weight: 500; }

        /* ---- Breadcrumb ---- */
        .breadcrumb {
            padding: 6px 12px;
            font-size: 11px;
            color: var(--text-2);
            background: var(--bg-1);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .breadcrumb span { cursor: pointer; color: var(--blue); }
        .breadcrumb span:hover { text-decoration: underline; }
        .breadcrumb .sep { color: var(--text-2); margin: 0 2px; }

        .hidden { display: none !important; }

        /* ---- Scrollbar ---- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-2); }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">EdgeSync <span>Fossil Playground</span></div>
        <input id="url" value="ws://localhost:8222" placeholder="NATS WebSocket URL" />
        <button class="btn" id="cloneBtn" onclick="cmd('clone')" disabled>Clone</button>
        <button class="btn" id="agentBtn" onclick="toggleAgent()" disabled>Start Agent</button>
        <button class="btn" id="syncNowBtn" onclick="cmd('syncNow')" disabled>Sync Now</button>
        <button class="btn" onclick="fetchRemoteInfo()">Remote</button>
        <button class="btn danger" onclick="clearOPFS()">Clear</button>
    </div>

    <!-- Status Strip -->
    <div class="status-strip" id="statusStrip">
        <div class="metric"><span class="dot off" id="repoDot"></span> <span id="s-repoLabel">No repo</span></div>
        <div class="sep"></div>
        <div class="metric">blobs <span class="v" id="s-blobs">-</span></div>
        <div class="metric">checkins <span class="v" id="s-checkins">-</span></div>
        <div class="metric">checkout <span class="v" id="s-checkout">-</span></div>
        <div class="sep"></div>
        <div class="metric"><span class="dot off" id="agentDot"></span> agent <span class="v" id="s-agent">off</span></div>
        <div class="sep"></div>
        <div class="metric" id="remoteMetric" style="display:none">remote <span class="v" id="r-blobs">-</span>/<span class="v" id="r-checkins">-</span></div>
        <div class="metric" id="s-project" style="margin-left:auto;color:var(--text-2)"></div>
    </div>

    <!-- Main 3-column layout -->
    <div class="main" id="mainLayout">

        <!-- Left Sidebar: Files + Timeline -->
        <div class="sidebar">
            <div class="sidebar-section grow">
                <div class="section-head">
                    Working Tree
                    <div class="actions">
                        <button class="btn sm" onclick="newFile()">+</button>
                        <button class="btn sm" onclick="deleteFile()">-</button>
                        <button class="btn sm" onclick="cmd('coStatus')">diff</button>
                    </div>
                </div>
                <div id="breadcrumb" class="breadcrumb"></div>
                <ul id="fileTree" class="tree-list"></ul>
            </div>

            <div class="sidebar-section" style="max-height:40%">
                <div class="section-head">Timeline</div>
                <ul id="timeline" class="timeline-list"></ul>
            </div>
        </div>

        <!-- Center: Editor -->
        <div class="editor-area">
            <div class="editor-toolbar">
                <div class="filepath" id="editorPath">
                    <span class="filename">No file selected</span>
                </div>
                <button class="btn sm" onclick="saveFile()">Save</button>
            </div>
            <div class="editor-wrap">
                <textarea id="editor" placeholder="Select a file from the working tree..." spellcheck="false"></textarea>
            </div>
            <div class="commit-bar">
                <input id="commitMsg" placeholder="Commit message..." />
                <input id="commitUser" class="user" placeholder="user" value="browser" />
                <button class="btn primary" onclick="doCommit()">Commit</button>
            </div>
        </div>

        <!-- Right Panel: Peers + Chat + Remote + Log -->
        <div class="right-panel">
            <div class="sidebar-section" id="peersSection" style="display:none">
                <div class="section-head">Peers <span id="peerCount" style="color:var(--green)"></span></div>
                <div id="peerList" style="padding:4px 12px;font-size:11px;color:var(--text-1)"></div>
            </div>
            <div class="sidebar-section" id="chatSection" style="max-height:35%;display:none">
                <div class="section-head">Chat</div>
                <div id="chatMessages" style="overflow-y:auto;flex:1;padding:4px 12px;font-size:11px;line-height:1.6"></div>
                <div style="display:flex;gap:4px;padding:4px 8px;border-top:1px solid var(--border)">
                    <input id="chatInput" placeholder="Type a message..." style="flex:1;background:var(--bg-0);border:1px solid var(--border);color:var(--text-0);padding:4px 8px;border-radius:4px;font-family:var(--mono);font-size:11px" onkeydown="if(event.key==='Enter')sendChatMsg()" />
                    <button class="btn sm" onclick="sendChatMsg()">Send</button>
                </div>
            </div>
            <div class="sidebar-section" id="remoteSection" style="max-height:30%;display:none">
                <div class="section-head">Remote</div>
                <ul id="remoteTimeline" class="timeline-list"></ul>
            </div>
            <div class="sidebar-section grow">
                <div class="section-head">Log</div>
                <div id="log" class="log-area"></div>
            </div>
        </div>
    </div>

    <script>
    let currentPath = "";
    let editingPath = null;
    let changeMap = {}; // name → status for badge display
    let agentRunning = false;

    function log(msg) {
        const el = document.getElementById("log");
        // Convert old-style color spans to classes.
        msg = msg.replace(/style='color:#e94560'/g, 'class="err"');
        el.innerHTML += msg + "<br>";
        el.scrollTop = el.scrollHeight;
    }

    const worker = new Worker("worker.js");

    worker.onmessage = function(e) {
        const msg = e.data;
        if (msg.type === "log") {
            log(msg.text);
        } else if (msg.type === "ready") {
            log("<b>WASM ready</b>");
            document.getElementById("cloneBtn").disabled = false;
            document.getElementById("agentBtn").disabled = false;
            cmd("status");
        } else if (msg.type === "result") {
            handleResult(msg.kind, msg.text);
        } else if (msg.type === "error") {
            log('<span class="err">ERR: ' + msg.text + '</span>');
        }
    };

    worker.onerror = function(e) {
        log('<span class="err">Worker: ' + e.message + '</span>');
    };

    function cmd(type, args) {
        worker.postMessage({ type, ...args });
    }

    function handleResult(kind, text) {
        const data = JSON.parse(text);

        if (kind === "status") {
            const dot = document.getElementById("repoDot");
            const label = document.getElementById("s-repoLabel");
            if (data.open) {
                dot.className = "dot ok";
                label.textContent = "connected";
                document.getElementById("s-blobs").textContent = data.blobs;
                document.getElementById("s-checkins").textContent = data.checkins;
                document.getElementById("s-checkout").textContent = data.hasCheckout ? "active" : "none";
                document.getElementById("s-project").textContent = data.projectCode ? data.projectCode.substring(0, 12) : "";
                cmd("timeline");
                if (data.hasCheckout) navigateTo("");
            } else {
                dot.className = "dot off";
                label.textContent = "no repo";
                log("No repo — click <b>Clone</b>.");
            }
        } else if (kind === "clone") {
            log('<span class="ok"><b>Cloned:</b> ' + data.blobs + ' blobs, ' + data.rounds + ' rounds</span>');
            cmd("status");
        } else if (kind === "checkout") {
            log('<span class="ok"><b>Checkout:</b> ' + data.files + ' files → OPFS</span>');
            navigateTo("");
            if (editingPath) cmd("coRead", { path: editingPath });
            cmd("timeline");
        } else if (kind === "sync") {
            log('<span class="ok"><b>Synced:</b> ↑' + data.sent + ' ↓' + data.received + ' (' + data.rounds + ' rounds)</span>');
            cmd("status");
        } else if (kind === "timeline") {
            renderTimeline(data);
        } else if (kind === "coFiles") {
            renderFileTree(data.path, data.entries || []);
        } else if (kind === "coRead") {
            document.getElementById("editor").value = data.content;
            setEditorPath(data.path);
            editingPath = data.path;
        } else if (kind === "coWrite") {
            navigateTo(currentPath);
        } else if (kind === "coDelete") {
            editingPath = null;
            document.getElementById("editor").value = "";
            setEditorPath(null);
            navigateTo(currentPath);
        } else if (kind === "coStatus") {
            renderChanges(data);
            // Re-render tree with badges.
            navigateTo(currentPath);
        } else if (kind === "coCommit") {
            log('<span class="ok"><b>Committed:</b> ' + data.uuid.substring(0, 10) + '</span>');
            changeMap = {};
            cmd("status");
        } else if (kind === "commit") {
            log('<span class="ok"><b>Committed:</b> ' + data.uuid.substring(0, 10) + '</span>');
            cmd("status");
        } else if (kind === "agentState") {
            agentRunning = data.state === "running";
            document.getElementById("agentBtn").textContent = agentRunning ? "Stop Agent" : "Start Agent";
            document.getElementById("agentDot").className = "dot " + (agentRunning ? "ok" : "off");
            document.getElementById("s-agent").textContent = agentRunning ? "running" : "off";
            document.getElementById("syncNowBtn").disabled = !agentRunning;
            // Show/hide social panels.
            document.getElementById("chatSection").style.display = agentRunning ? "" : "none";
            document.getElementById("peersSection").style.display = agentRunning ? "" : "none";
            if (data.peerId) document.title = "EdgeSync [" + data.peerId + "]";
        } else if (kind === "chatMsg") {
            appendChatMessage(data);
        } else if (kind === "peers") {
            renderPeers(data);
        } else if (kind === "agentLog") {
            // Agent logs already appear via Logger. Refresh status after syncs.
            if (agentRunning && data.msg && data.msg.includes("sync done")) {
                setTimeout(() => cmd("status"), 500);
            }
        }
    }

    function setEditorPath(path) {
        const el = document.getElementById("editorPath");
        if (!path) {
            el.innerHTML = '<span class="filename">No file selected</span>';
        } else {
            const parts = path.split("/");
            const name = parts.pop();
            const dir = parts.length ? parts.join("/") + "/" : "";
            el.innerHTML = dir + '<span class="filename">' + name + '</span>';
        }
    }

    function navigateTo(path) {
        currentPath = path;
        cmd("coFiles", { path });
    }

    function renderBreadcrumb(path) {
        const el = document.getElementById("breadcrumb");
        let html = '<span onclick="navigateTo(\'\')">/</span>';
        if (path) {
            const parts = path.split("/");
            let accum = "";
            for (const part of parts) {
                accum += (accum ? "/" : "") + part;
                const p = accum;
                html += '<span class="sep">/</span><span onclick="navigateTo(\'' + p + '\')">' + part + '</span>';
            }
        }
        el.innerHTML = html;
    }

    function renderFileTree(path, entries) {
        renderBreadcrumb(path);
        const ul = document.getElementById("fileTree");
        ul.innerHTML = "";

        if (path) {
            const li = document.createElement("li");
            li.className = "dir";
            li.innerHTML = '<span class="icon">..</span><span class="name">..</span>';
            const parent = path.includes("/") ? path.substring(0, path.lastIndexOf("/")) : "";
            li.onclick = () => navigateTo(parent);
            ul.appendChild(li);
        }

        if (!entries || entries.length === 0) {
            const li = document.createElement("li");
            li.innerHTML = '<span class="icon"></span><span class="name" style="color:var(--text-2)">empty</span>';
            ul.appendChild(li);
            return;
        }

        entries.forEach(e => {
            const li = document.createElement("li");
            const fullPath = path ? path + "/" + e.name : e.name;

            if (e.isDir) {
                li.className = "dir";
                li.innerHTML = '<span class="icon">▸</span><span class="name">' + escapeHtml(e.name) + '</span>';
                li.onclick = () => navigateTo(fullPath);
            } else {
                li.className = "file";
                let badge = "";
                const status = changeMap[fullPath];
                if (status) {
                    const letter = status === "added" ? "A" : status === "modified" ? "M" : "D";
                    badge = '<span class="badge ' + letter + '">' + letter + '</span>';
                }
                li.innerHTML = '<span class="icon">·</span><span class="name">' + escapeHtml(e.name) + '</span>' + badge + '<span class="meta">' + e.size + '</span>';
                li.onclick = () => openFile(fullPath);
                if (editingPath === fullPath) li.classList.add("active");
            }
            ul.appendChild(li);
        });
    }

    function openFile(path) {
        editingPath = path;
        document.getElementById("editor").value = "Loading...";
        setEditorPath(path);
        cmd("coRead", { path });
    }

    function saveFile() {
        if (!editingPath) { log("No file open."); return; }
        const content = document.getElementById("editor").value;
        cmd("coWrite", { path: editingPath, content });
        log("Saving " + editingPath + "...");
    }

    function newFile() {
        const name = prompt("File path (relative to current dir):");
        if (!name) return;
        const fullPath = currentPath ? currentPath + "/" + name : name;
        editingPath = fullPath;
        setEditorPath(fullPath);
        document.getElementById("editor").value = "";
        cmd("coWrite", { path: fullPath, content: "" });
    }

    function deleteFile() {
        if (!editingPath) { log("No file selected."); return; }
        if (!confirm("Delete " + editingPath + "?")) return;
        cmd("coDelete", { path: editingPath });
    }

    function renderChanges(changes) {
        changeMap = {};
        if (!changes || changes.length === 0) {
            log("Clean — working tree matches tip.");
            return;
        }
        changes.forEach(c => { changeMap[c.name] = c.status; });
        const a = changes.filter(c => c.status === "added").length;
        const m = changes.filter(c => c.status === "modified").length;
        const d = changes.filter(c => c.status === "deleted").length;
        let parts = [];
        if (m) parts.push('<span style="color:var(--orange)">' + m + 'M</span>');
        if (a) parts.push('<span style="color:var(--green)">' + a + 'A</span>');
        if (d) parts.push('<span style="color:var(--red)">' + d + 'D</span>');
        log("<b>Status:</b> " + parts.join(" "));
    }

    function renderTimeline(entries) {
        const ul = document.getElementById("timeline");
        ul.innerHTML = "";
        if (!entries || entries.length === 0) {
            ul.innerHTML = "<li style='color:var(--text-2)'>No checkins</li>";
            return;
        }
        entries.forEach(e => {
            const li = document.createElement("li");
            const date = new Date(e.time).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
            li.innerHTML =
                '<span class="hash">' + escapeHtml(e.uuid.substring(0,8)) + '</span> ' +
                '<span class="author">' + escapeHtml(e.user) + '</span> ' +
                '<span class="time">' + escapeHtml(date) + '</span><br>' +
                '<span class="msg">' + escapeHtml(e.comment || "") + '</span>';
            ul.appendChild(li);
        });
    }

    function toggleAgent() {
        if (agentRunning) {
            cmd("stopAgent");
        } else {
            const url = document.getElementById("url").value;
            cmd("startAgent", { url });
        }
    }

    function doCommit() {
        const comment = document.getElementById("commitMsg").value || "edit from browser";
        const user = document.getElementById("commitUser").value || "browser";
        log("Committing...");
        cmd("coCommit", { comment, user });
    }

    function appendChatMessage(msg) {
        const el = document.getElementById("chatMessages");
        const t = new Date(msg.time).toLocaleTimeString(undefined, {hour:'2-digit',minute:'2-digit'});
        const color = msg.from.includes(document.title.match(/\[(\w+)\]/)?.[1] || "???") ? "var(--accent)" : "var(--blue)";
        el.innerHTML += '<div><span style="color:' + color + '">' + msg.from + '</span> <span style="color:var(--text-2)">' + t + '</span><br>' + escapeHtml(msg.text) + '</div>';
        el.scrollTop = el.scrollHeight;
    }

    function escapeHtml(s) {
        return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function renderPeers(peers) {
        const el = document.getElementById("peerList");
        document.getElementById("peerCount").textContent = peers.length;
        el.innerHTML = peers.map(p =>
            '<span style="color:' + (p.isMe ? 'var(--accent)' : 'var(--green)') + '">' +
            (p.isMe ? '● ' + p.id + ' (you)' : '● ' + p.id) + '</span>'
        ).join(' &nbsp; ');
    }

    function sendChatMsg() {
        const input = document.getElementById("chatInput");
        const text = input.value.trim();
        if (!text) return;
        const user = document.getElementById("commitUser").value || "browser";
        cmd("sendChat", { text, user });
        input.value = "";
    }

    async function fetchRemoteInfo() {
        try {
            const resp = await fetch("/remote-info");
            const data = await resp.json();
            if (data.error) { log('<span class="err">Remote: ' + data.error + '</span>'); return; }

            document.getElementById("remoteMetric").style.display = "";
            document.getElementById("r-blobs").textContent = data.blobs;
            document.getElementById("r-checkins").textContent = data.checkins;

            const section = document.getElementById("remoteSection");
            section.style.display = "";
            const ul = document.getElementById("remoteTimeline");
            ul.innerHTML = "";
            (data.timeline || []).forEach(e => {
                const li = document.createElement("li");
                li.innerHTML =
                    '<span class="hash">' + escapeHtml(e.uuid.substring(0,8)) + '</span> ' +
                    '<span class="author">' + escapeHtml(e.user) + '</span> ' +
                    '<span class="time">' + escapeHtml(e.time) + '</span><br>' +
                    '<span class="msg">' + escapeHtml(e.comment || "") + '</span>';
                ul.appendChild(li);
            });
        } catch (e) {
            log('<span class="err">Remote: ' + e.message + '</span>');
        }
    }

    async function clearOPFS() {
        try {
            // Terminate the Worker to release sync access handles.
            worker.terminate();
            // Small delay to let handles release.
            await new Promise(r => setTimeout(r, 200));
            const root = await navigator.storage.getDirectory();
            try { await root.removeEntry("sqlite3-opfs", { recursive: true }); } catch (e) { console.log("clear sqlite3-opfs:", e); }
            try { await root.removeEntry("checkout", { recursive: true }); } catch (e) { console.log("clear checkout:", e); }
            // Reload to restart fresh with new Worker.
            location.reload();
        } catch (e) {
            log("Clear: " + e.message);
        }
    }

    log("Starting worker...");
    </script>
</body>
</html>
